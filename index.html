<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="description"
      content="Validatify - A simple password validation form"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/view/style.css">
    <link rel="icon" href="favicon-32x32.png" type="img/png">
    <title>Validatify</title>
  </head>

  <body class="text-base">
    <form action="https://stephen-emmahi-nartey/bin" method="post">
      <!-- email -->
      <div class="email-group">
        <label for="email">Email</label>
        <input 
         class="border outline-none block" 
         type="email" 
         name="email"
         id="email"
         placeholder="name@gmail.com"
        >
      </div>
      <!-- password -->
      <div class="password-group">
        <label for="password">Password</label>
        <div class="relative w-fit">
          <input 
           class="border outline-none"
           type="password"
           name="password" 
           id="password"
           placeholder="********"
           autocomplete="new-password"
          >
          <button id="showHidePasswordBtn" type="button" class="absolute right-3 -translate-y-0.5">show</button>
        </div>
        <div id="password-rules" class="hidden text-red-500">
          <p id="char-long">From 8 to 20 characters long</p>
          <p id="upper">At least one uppercase</p>
          <p id="lower">At least one lowercase</p>
          <p id="samePasswordAndEmail" class="hidden">Password cannot be same as email</p>
        </div>
      </div>
      <!-- checkbox -->
      <input type="checkbox" id="checkbox" name="checkbox">
      <label for="checkbox">I agree to the 
        <a href="#" class="text-violet-500">Terms and Conditions.</a>
      </label>
      <!-- submit button -->
      <button id="submitBtn" class="block border" type="submit" disabled>Submit</button>
    </form>
    <script type="module" src="./src/controller/main.js"></script>
  </body>
</html>
