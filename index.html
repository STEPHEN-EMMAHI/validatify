<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="description"
      content="Validatify - A simple password validation form"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/view/style.css">
    <link rel="icon" href="favicon-32x32.png" type="img/png">
    <title>Validatify</title>
  </head>

  <body class="text-base">
    <div class="h-screen flex flex-col justify-center md:items-center">
      <!-- HEADER -->
      <header class="w-full text-center">
        <h1 class="text-2xl font-bold">Create Account</h1>
        <p class="text-sm">Sign up to access all features and get started</p>
      </header>

      <!-- MAIN -->
      <main class="mx-3 mt-4 ">
        <form action="https://stephen-emmahi-nartey/bin" method="post">
          <!-- email -->
          <div class="email-group text-sm mb-2">
            <label for="email" class="mb-2 block">Email</label>
            <input 
             class="border rounded-lg outline-none block p-2 w-full" 
             type="email" 
             name="email"
             id="email"
             placeholder="name@gmail.com"
            >
          </div>
          <!-- password -->
          <div class="password-group text-sm mb-2">
            <label for="password" class="mb-2 block">Password</label>
            <div class="relative">
              <input 
               class="border rounded-lg outline-none p-2 w-full"
               type="password"
               name="password" 
               id="password"
               placeholder="********"
               autocomplete="new-password"
              >
              <button id="showHidePasswordBtn" type="button" class="absolute text-sm right-3 top-2.5 -translate-y-0.5">show</button>
            </div>
            <div id="password-rules" class="hidden text-red-500">
              <p id="char-long">From 8 to 20 characters long</p>
              <p id="upper">At least one uppercase</p>
              <p id="lower">At least one lowercase</p>
              <p id="samePasswordAndEmail" class="hidden">Password cannot be same as email</p>
            </div>
            <!-- confirm password -->
            <label for="password" class="mt-2 mb-2 block">Confirm Password</label>
            <div class="relative">
              <input 
               class="border rounded-lg outline-none p-2 w-full"
               type="password"
               name="confirmPassword" 
               id="confirmPassword"
               placeholder="********"
               autocomplete="new-password"
              >
              <button id="showOrHideConfirmPasswordBtn" type="button" class="absolute text-sm right-3 top-2.5 -translate-y-0.5">show</button>
            </div>
            <p id="confirmPasswordWarning" class="text-red-500 mt-1 hidden">Password mismatch</p>
          </div>
          <!-- checkbox -->
          <input type="checkbox" id="checkbox" name="checkbox" class="size-4 mt-3">
          <label for="checkbox" class="text-sm">I agree to the 
            <a href="#" class="text-violet-500">Terms and Conditions.</a>
          </label>
          <!-- submit button -->
          <button id="submitBtn" class="m-4 block border mx-auto p-2 w-full text-white" type="submit" disabled>Submit</button>
        </form>
      </main>
    </div>
    <script type="module" src="./src/controller/main.js"></script>
  </body>
</html>
